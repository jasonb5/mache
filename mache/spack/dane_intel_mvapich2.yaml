spack:
  specs:
  - intel
  - intel-oneapi-mkl
  - mvapich2
{{ specs }}
  config:
    install_missing_compilers: false
  concretizer:
    unify: true
  packages:
    libtool:
      externals:
      - spec: libtool@2.4.6
        prefix: /usr
      buildable: false
    autoconf:
      externals:
      - spec: autoconf@2.69
        prefix: /usr
      buildable: false
    m4:
      externals:
      - spec: m4@1.4.18
        prefix: /usr
      buildable: false
    automake:
      externals:
      - spec: automake@1.16.1
        prefix: /usr
      buildable: false
    perl:
      externals:
      - spec: perl@5.26.3+cpanm+opcode+open+shared+threads
        prefix: /usr
      buildable: false
    ncurses:
      externals:
      - spec: ncurses@6.1.20180224+termlib abi=6
        prefix: /usr
      buildable: false
    bzip2:
      externals:
      - spec: bzip2@1.0.6
        prefix: /usr
      buildable: false
    pkgconf:
      externals:
      - spec: pkgconf@1.4.2
        prefix: /usr
      buildable: false
    gmake:
      externals:
      - spec: gmake@4.2.1
        prefix: /usr
      buildable: false
    curl:
      externals:
      - spec: curl@7.61.1+gssapi+ldap+nghttp2
        prefix: /usr
      buildable: false
    mvapich2:
      externals:
      - spec: mvapich2@2.3.7~cuda~debug+regcache+wrapperrpath ch3_rank_bits=32 file_systems=lustre,nfs,ufs
          process_managers=hydra threads=multiple
        prefix: /usr/tce/packages/mvapich2-tce/mvapich2-2.3.7-intel-classic-2021.6.0
        modules:
        - mvapich2/2.3.7
        - mvapich2-tce/2.3.7
      buildable: false
    intel-oneapi-mkl:
      externals:
      - spec: intel-oneapi-mkl@2022.1.0
        prefix: /usr/tce/packages/mkl-interfaces/mkl-interfaces-2022.1.0-intel-2021.6.0
        modules:
        - mkl-interfaces/2022.1.0
      buildable: false
    all:
      compiler: [intel@2021.6.0]
      providers:
        mpi: [mvapich2@2.3.7]
        lapack: [intel-oneapi-mkl@2022.1.0]
  compilers:
  - compiler:
      spec: intel@=2021.6.0
      paths:
        cc: /usr/tce/packages/intel-classic/intel-classic-2021.6.0-magic/bin/icc
        cxx: /usr/tce/packages/intel-classic/intel-classic-2021.6.0-magic/bin/icpc
        f77: /usr/tce/packages/intel-classic/intel-classic-2021.6.0-magic/bin/ifort
        fc: /usr/tce/packages/intel-classic/intel-classic-2021.6.0-magic/bin/ifort
      flags: {}
      operating_system: rhel8
      target: x86_64
      modules:
      - StdEnv
      - intel-classic/2021.6.0-magic
      environment: {}
      extra_rpaths: []
