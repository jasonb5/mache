[e3sm_unified]

group = e3sm

compiler = intel

mpi = mvapich2

base_path = /usr/workspace/e3sm/apps/e3sm-unified

use_system_hdf5_netcdf = False

[parallel]

system = slurm

parallel_executable = srun

cores_per_node = 56

partitions = pdebug, pbatch

[spack]

modules_before = False

modules_after = True
